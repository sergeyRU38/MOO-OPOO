<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подать заявку | МОО ОПОО</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: #1e293b;
            background: linear-gradient(145deg, #f4f7fc 0%, #eef2f6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .form-container {
            max-width: 900px;
            width: 100%;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 3rem;
            box-shadow: 0 40px 60px -20px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 2rem;
            transition: gap 0.2s;
        }

        .back-link:hover {
            gap: 12px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            color: #64748b;
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
        }

        .progress-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2.5rem;
            position: relative;
        }

        .progress-bar::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 0;
            right: 0;
            height: 3px;
            background: #e2e8f0;
            z-index: 0;
        }

        .progress-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            position: relative;
            z-index: 1;
        }

        .step-circle {
            width: 35px;
            height: 35px;
            background: white;
            border: 3px solid #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #94a3b8;
            background: #f8fafc;
        }

        .step-circle.active {
            border-color: #3b82f6;
            background: #3b82f6;
            color: white;
        }

        .step-circle.completed {
            border-color: #10b981;
            background: #10b981;
            color: white;
        }

        .step-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #64748b;
        }

        .form-section {
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            font-weight: 600;
            color: #334155;
            font-size: 0.95rem;
        }

        label i {
            color: #3b82f6;
            width: 20px;
        }

        input, select, textarea {
            padding: 0.9rem 1.2rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            background: white;
            transition: all 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59,130,246,0.15);
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem 2rem;
            padding: 1rem 0;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .checkbox-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #3b82f6;
        }

        .btn-submit {
            background: linear-gradient(145deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 1.2rem 2rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.25s;
            box-shadow: 0 20px 30px -8px rgba(37, 99, 235, 0.4);
            margin-top: 1rem;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 28px 35px -10px #1e4bd2;
        }

        .file-upload {
            border: 2px dashed #cbd5e1;
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            background: #fafcff;
            cursor: pointer;
            transition: all 0.2s;
        }

        .file-upload:hover {
            border-color: #3b82f6;
            background: #eff6ff;
        }

        .file-upload i {
            font-size: 2.5rem;
            color: #3b82f6;
            margin-bottom: 0.5rem;
        }

        .file-upload input {
            display: none;
        }

        .contact-info {
            background: #eef2ff;
            border-radius: 20px;
            padding: 1.5rem;
            margin: 2rem 0;
        }

        .success-message {
            text-align: center;
            padding: 3rem 1rem;
            display: none;
        }

        .success-message i {
            font-size: 5rem;
            color: #10b981;
            margin-bottom: 1.5rem;
        }

        .success-message h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 700px) {
            body { padding: 1rem; }
            .form-container { padding: 2rem 1.5rem; }
